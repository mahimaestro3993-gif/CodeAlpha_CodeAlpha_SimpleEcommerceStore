<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart - AlphaMarket</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="navbar">
        <div class="logo">AlphaMarket</div>
        <nav>
            <a href="index.html">Home</a>
            <a href="cart.html" class="active">Cart</a>
            <a href="login.html" id="auth-link">Login</a>
        </nav>
    </header>

    <main class="container" style="max-width: 800px;">
        <h1 class="section-title">Your Shopping Cart</h1>
        
        <div class="product-card" style="padding: 2rem;">
            <div id="cart-items-list">
                <p class="loading">Your shopping cart is empty.</p>
            </div>
            
            <hr style="margin: 1.5rem 0; border: 0; border-top: 1px solid #e2e8f0;">
            
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                <h3>Total Amount:</h3>
                <h2 id="cart-total-price" style="color: #2b6cb0;">$0.00</h2>
            </div>
            
            <button id="checkout-btn" class="btn" style="width: 100%; display: none;">Proceed to Secure Checkout</button>
        </div>
    </main>

    <script src="cart.js"></script>
</body>
</html>
